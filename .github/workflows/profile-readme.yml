name: Profile README checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install check tools
        run: python -m pip install --upgrade pip pytest ruff

      - name: Lint profile README tests
        run: python -m ruff check tests/

      - name: Test profile README
        run: python -m pytest tests/ -q
